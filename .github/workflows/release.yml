name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(python3 -c 'import json; print(json.load(open("custom_components/anker_prime_charger_a2345/manifest.json", encoding="utf-8"))["version"])')"

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Validate integration files
        run: |
          python3 -m compileall -q custom_components/anker_prime_charger_a2345
          python3 -m json.tool hacs.json >/dev/null
          python3 -m json.tool custom_components/anker_prime_charger_a2345/manifest.json >/dev/null
          python3 -m json.tool custom_components/anker_prime_charger_a2345/strings.json >/dev/null
          python3 -m json.tool custom_components/anker_prime_charger_a2345/translations/de.json >/dev/null
          python3 -m json.tool custom_components/anker_prime_charger_a2345/translations/en.json >/dev/null

      - name: Build release notes
        run: |
          printf '%s\n' \
            '## Anker Prime Charger (A2345)' \
            '' \
            'HACS release for the Anker Prime Charger A2345 / 250W Desktop Charger custom integration.' \
            '' \
            '### Installation' \
            '' \
            'Add this repository to HACS as a custom integration repository and install the released version.' \
            '' \
            '### Notes' \
            '' \
            'This integration uses unofficial Anker Cloud and MQTT behavior. APIs and payloads may change without notice.' \
            > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Anker Prime Charger (A2345) $GITHUB_REF_NAME" \
            --notes-file release-notes.md
